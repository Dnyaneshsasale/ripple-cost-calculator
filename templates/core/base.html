<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ripple Cost Calculator</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<header>
    <div class="nav-left">
        <a href="{% url 'landing' %}" class="logo">Ripple Cost</a>
    </div>
<nav class="nav-right">
    <a href="{% url 'landing' %}">🏠 Home</a>
    {% if user.is_authenticated %}

    {% endif %}
</nav>


</header>

<main>
    {% block content %}{% endblock %}

<script src="/static/js/main.js"></script>
</body>
</html>
