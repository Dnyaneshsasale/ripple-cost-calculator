{% extends "core/base.html" %}
{% block content %}
<h2>Daily / Weekly Choices</h2>
<form method="post">
    {% csrf_token %}
    <table>
        <tr>
            <th>Category</th>
            <th>Activity</th>
            <th>Value</th>
            <th>Unit</th>
        </tr>
        {% for activity in activities %}
        <tr>
            <td>{{ activity.category }}</td>
            <td>{{ activity.name }}</td>
            <td>
                <input type="number" step="0.01" name="activity_{% autoescape off %}{{ activity.id }}{% endautoescape %}">
            </td>
            <td>{{ activity.unit }}</td>
        </tr>
        {% endfor %}
    </table>
    <button type="submit" class="btn-primary">Calculate Ripple</button>
</form>
{% endblock %}
