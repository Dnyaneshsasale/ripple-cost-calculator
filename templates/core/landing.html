{% extends "core/base.html" %}
{% block content %}
<section class="hero">
    <h1>Ripple Cost Calculator</h1>
    <p>Your daily choices → environmental ripple → money impact (5 years)</p>
    <div class="hero-actions">
        <a href="{% url 'signup' %}" class="btn-primary">Get Started</a>
        <a href="{% url 'login' %}" class="btn-secondary">Already have an account?</a>
    </div>
</section>

<section class="demo">
    <h2>Example: Plastic bag ripple</h2>
    <label>Bags per week:</label>
    <input type="range" id="demoBags" min="0" max="50" value="10">
    <span id="demoBagsValue">10</span> bags/week
    <p id="demoCostText"></p>
</section>
{% endblock %}
