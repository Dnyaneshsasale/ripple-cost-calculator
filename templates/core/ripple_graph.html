{% extends "core/base.html" %}
{% block content %}
<div class="graph-container">
    <h2>🪝 Your Ripple Chain</h2>
    <svg id="rippleGraph" width="100%" height="500"></svg>
    <p class="graph-caption">Click nodes to see impact breakdown</p>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const data = {{ chain_data|safe }};
const svg = d3.select("#rippleGraph");
const width = 1000, height = 500;

// Force simulation
const simulation = d3.forceSimulation(data.nodes)
    .force("link", d3.forceLink(data.links).id(d => d.id).distance(120))
    .force("charge", d3.forceManyBody().strength(-300))
    .force("center", d3.forceCenter(width / 2, height / 2));

// Links
const link = svg.append("g")
    .selectAll("line")
    .data(data.links)
    .enter().append("line")
    .attr("stroke-width", d => Math.sqrt(d.value) * 3)
    .attr("stroke", "#10b981")
    .attr("stroke-opacity", 0.6);

// Nodes
const node = svg.append("g")
    .selectAll("circle")
    .data(data.nodes)
    .enter().append("circle")
    .attr("r", 25)
    .attr("fill", d => d.group === "plastic" ? "#ef4444" : 
                     d.group === "env" ? "#f59e0b" : 
                     d.group === "eco" ? "#10b981" : "#3b82f6")
    .call(d3.drag()
        .on("start", dragstarted)
        .on("drag", dragged)
        .on("end", dragended));

// Labels
const label = svg.append("g")
    .selectAll("text")
    .data(data.nodes)
    .enter().append("text")
    .text(d => d.label)
    .attr("font-weight", 500)
    .attr("font-size", 12)
    .attr("text-anchor", "middle")
    .attr("fill", "#1e293b");

// Tick function
simulation.on("tick", () => {
    link
        .attr("x1", d => d.source.x)
        .attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x)
        .attr("y2", d => d.target.y);
    
    node
        .attr("cx", d => d.x)
        .attr("cy", d => d.y);
    
    label
        .attr("x", d => d.x)
        .attr("y", d => d.y + 5);
});

// Drag functions
function dragstarted(event, d) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x;
    d.fy = d.y;
}

function dragged(event, d) {
    d.fx = event.x;
    d.fy = event.y;
}

function dragended(event, d) {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null;
    d.fy = null;
}
</script>

<style>
.graph-container { max-width: 1200px; margin: 2rem auto; }
#rippleGraph { background: rgba(255,255,255,0.9); border-radius: 20px; padding: 2rem; }
.graph-caption { text-align: center; margin-top: 1rem; color: #64748b; }
</style>
{% endblock %}
